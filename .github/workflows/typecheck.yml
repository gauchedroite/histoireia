name: Typecheck & Lint
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd client && npm ci && npx tsc --noEmit && npx eslint src/
      - run: cd server && npm ci && npx tsc --noEmit && npx eslint src/
